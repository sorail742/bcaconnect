services:
  - type: web
    name: bcaconnect-backend
    env: node
    region: frankfurt # Plus proche pour Neon eu-central-1
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # À configurer manuellement dans le dashboard Render
      - key: JWT_SECRET
        sync: false # À configurer manuellement dans le dashboard Render
      - key: PORT
        value: 10000
